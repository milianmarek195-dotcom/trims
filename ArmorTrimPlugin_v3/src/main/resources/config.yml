# ============================================
#   ArmorTrimPlugin v3.0 - Konfiguration
# ============================================

# Rang-Hierarchie: default < vip < mod < admin < owner

trim-permissions:
  SENTRY: default
  DUNE: default
  COAST: default
  WILD: default
  WARD: default
  EYE: default
  VEX: vip
  TIDE: vip
  SNOUT: vip
  RIB: vip
  SPIRE: mod
  WAYFINDER: mod
  SHAPER: mod
  RAISER: mod
  HOST: mod
  SILENCE: mod
  FLOW: admin
  BOLT: admin

material-permissions:
  AMETHYST: default
  COPPER: default
  DIAMOND: default
  EMERALD: default
  GOLD: default
  IRON: default
  LAPIS: default
  QUARTZ: default
  REDSTONE: default
  NETHERITE: vip
  RESIN: mod

leather-color-permission: default

