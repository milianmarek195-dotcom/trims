name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn clean package -DskipTests
        working-directory: ArmorTrimPlugin/ArmorTrimPlugin
      - uses: actions/upload-artifact@v4
        with:
          name: ArmorTrimPlugin
          path: ArmorTrimPlugin/ArmorTrimPlugin/target/*.jar
