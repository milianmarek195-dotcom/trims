name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Find and build
        run: |
          find . -name "pom.xml" | head -5
          POM=$(find . -name "pom.xml" | head -1)
          DIR=$(dirname $POM)
          echo "Building in: $DIR"
          cd $DIR && mvn clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: ArmorTrimPlugin
          path: "**/target/*.jar"
